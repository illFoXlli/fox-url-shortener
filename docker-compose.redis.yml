name: "${DEV_REDIS_PROJECT_NAME:?DEV_REDIS_PROJECT_NAME is required}"

services:
  redis:
    image: "${DEV_REDIS_IMAGE:?DEV_REDIS_IMAGE is required}"
    container_name: "${DEV_REDIS_CONTAINER_NAME:?DEV_REDIS_CONTAINER_NAME is required}"
    environment:
      REDIS_USERNAME: "${DEV_REDIS_USERNAME:?DEV_REDIS_USERNAME is required}"
      REDIS_PASSWORD: "${DEV_REDIS_PASSWORD:?DEV_REDIS_PASSWORD is required}"
      REDIS_PORT: "${DEV_REDIS_INTERNAL_PORT:?DEV_REDIS_INTERNAL_PORT is required}"
      REDIS_MAXMEMORY: "${DEV_REDIS_MAXMEMORY:?DEV_REDIS_MAXMEMORY is required}"
      REDIS_MAXMEMORY_POLICY: "${DEV_REDIS_MAXMEMORY_POLICY:?DEV_REDIS_MAXMEMORY_POLICY is required}"
    command:
      - redis-server
      - --port
      - "${DEV_REDIS_INTERNAL_PORT:?DEV_REDIS_INTERNAL_PORT is required}"
      - --user
      - default
      - "off"
      - --user
      - "${DEV_REDIS_USERNAME:?DEV_REDIS_USERNAME is required}"
      - "on"
      - ">${DEV_REDIS_PASSWORD:?DEV_REDIS_PASSWORD is required}"
      - "~*"
      - "&*"
      - "+@all"
      - --appendonly
      - "no"
      - --maxmemory
      - "${DEV_REDIS_MAXMEMORY:?DEV_REDIS_MAXMEMORY is required}"
      - --maxmemory-policy
      - "${DEV_REDIS_MAXMEMORY_POLICY:?DEV_REDIS_MAXMEMORY_POLICY is required}"
    ports:
      - "${DEV_REDIS_EXTERNAL_PORT:?DEV_REDIS_EXTERNAL_PORT is required}:${DEV_REDIS_INTERNAL_PORT:?DEV_REDIS_INTERNAL_PORT is required}"
    volumes:
      - dev-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli --user \"$${REDIS_USERNAME}\" -p \"$${REDIS_PORT}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  dev-redis-data:
