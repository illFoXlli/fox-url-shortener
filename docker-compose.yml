services:
  db-init:
    image: postgres:17-alpine
    env_file:
      - .env
    volumes:
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint-initdb.d/init-db.sh"]

  app:
    build: .
    env_file:
      - .env
    depends_on:
      db-init:
        condition: service_completed_successfully
    ports:
      - "3396:3396"
