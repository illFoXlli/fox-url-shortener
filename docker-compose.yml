name: "${DEV_APP_PROJECT_NAME:?DEV_APP_PROJECT_NAME is required}"

services:
  backend:
    build: .
    image: "${APP_IMAGE:?APP_IMAGE is required}"
    container_name: "${DEV_APP_CONTAINER_NAME:?DEV_APP_CONTAINER_NAME is required}"
    env_file:
      - path: .env
        required: true
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DEV_DB_HOST: "${DEV_DB_DOCKER_HOST:?DEV_DB_DOCKER_HOST is required}"
      DEV_DB_PORT: "${DEV_DB_EXTERNAL_PORT:?DEV_DB_EXTERNAL_PORT is required}"
      DEV_REDIS_HOST: "${DEV_REDIS_DOCKER_HOST:?DEV_REDIS_DOCKER_HOST is required}"
      DEV_REDIS_PORT: "${DEV_REDIS_EXTERNAL_PORT:?DEV_REDIS_EXTERNAL_PORT is required}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${DEV_APP_EXTERNAL_PORT:?DEV_APP_EXTERNAL_PORT is required}:${DEV_APP_INTERNAL_PORT:?DEV_APP_INTERNAL_PORT is required}"
    restart: unless-stopped
