services:
  backend-db-init:
    image: postgres:17-alpine
    env_file:
      - .env
    environment:
      DB_HOST: host.docker.internal
    volumes:
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint-initdb.d/init-db.sh"]

  backend:
    build: .
    env_file:
      - .env
    environment:
      DB_HOST: host.docker.internal
    depends_on:
      backend-db-init:
        condition: service_completed_successfully
    ports:
      - "3396:3396"
