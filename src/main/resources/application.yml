spring:
  application:
    name: fox-url-shortener
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fox_url_shortener}
    username: ${DB_USERNAME:fox}
    password: ${DB_PASSWORD:change_me}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${APP_PORT:3396}
  forward-headers-strategy: framework

app:
  base-url: ${APP_BASE_URL:http://localhost:3396}
  short-url-base-url: ${SHORT_URL_BASE_URL:http://localhost:3396}
  admin:
    login: ${ADMIN_LOGIN:}
    password: ${ADMIN_PASSWORD:}
    display-name: ${ADMIN_DISPLAY_NAME:FoX Admin}
  jwt:
    secret: ${JWT_SECRET:change_me_to_long_secret_change_me_to_long_secret}
    access-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:15}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:30}
  cookie:
    access-token-name: ${COOKIE_ACCESS_TOKEN_NAME:fox_access_token}
    refresh-token-name: ${COOKIE_REFRESH_TOKEN_NAME:fox_refresh_token}
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAME_SITE:Lax}
    domain: ${COOKIE_DOMAIN:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3395}
  short-link:
    code-min-length: 6
    code-max-length: 8
    default-expiration-days: 30
  forwarded:
    proto-header: ${FORWARDED_PROTO_HEADER:X-Forwarded-Proto}
    host-header: ${FORWARDED_HOST_HEADER:X-Forwarded-Host}
    port-header: ${FORWARDED_PORT_HEADER:X-Forwarded-Port}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

logging:
  level:
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: error
    org.springdoc.core.events.SpringDocAppInitializer: error
