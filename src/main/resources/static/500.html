<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Server error</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f4;
        --surface: #ffffff;
        --text: #1f2a24;
        --muted: #66746b;
        --primary: #17694a;
        --border: #dfe6df;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        width: min(100% - 32px, 560px);
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        padding: 32px;
        text-align: center;
      }

      .code {
        margin: 0 0 12px;
        color: var(--danger);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 7vw, 56px);
        line-height: 1;
      }

      p {
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="code">500</p>
      <h1>Something went wrong</h1>
      <p>The server could not process this request. Please try refreshing the page a little later.</p>
    </main>
  </body>
</html>
